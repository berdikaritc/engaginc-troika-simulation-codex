<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=720, initial-scale=1">
  <title>Anak Bos Troika — Simulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="animation" aria-label="Anak Bos Troika game simulation">
    <header class="topbar">
      <img class="logo" src="logo/logo.png" alt="Anak Bos Troika">
      <div class="status">
        <div id="turn-info">GET READY</div>
        <div id="step-info">Simulation loading…</div>
      </div>
    </header>

    <section id="p1-zone" class="zone player-zone">
      <div id="p1-pile" class="pile"></div>
      <div id="p1-label" class="zone-label">P1 <span>HAND</span></div>
    </section>

    <section id="discard-zone" class="zone discard-zone">
      <div id="discard-pile" class="pile"></div>
      <div class="zone-label discard-label">DISCARD <span>PILE</span></div>
    </section>

    <section id="p2-zone" class="zone player-zone">
      <div id="p2-pile" class="pile"></div>
      <div id="p2-label" class="zone-label">P2 <span>HAND</span></div>
    </section>

    <div id="callout" class="callout" aria-live="polite"></div>
    <div id="flying-layer" aria-hidden="true"></div>
    <div id="error" class="error" hidden></div>
  </main>
  <script src="app.js"></script>
</body>
</html>
