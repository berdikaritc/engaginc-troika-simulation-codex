<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Anak Bos Troika — Simulation</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="game" aria-live="polite">
    <header class="masthead">
      <img src="logo/logo.png" alt="Anak Bos Troika" class="logo">
      <div class="status">
        <span id="turn-label">GET READY</span>
        <span id="step-label">Simulation starts soon</span>
      </div>
    </header>
    <section class="zone player-zone" aria-label="Player 1 hand">
      <h2>PLAYER 1</h2><div id="p1" class="pile hand"></div>
    </section>
    <div class="gap"></div>
    <section class="zone discard-zone" aria-label="Discard pile">
      <h2>DISCARD PILE</h2><div id="discard" class="pile"></div>
    </section>
    <div class="gap"></div>
    <section class="zone player-zone" aria-label="Player 2 hand">
      <h2>PLAYER 2</h2><div id="p2" class="pile hand"></div>
    </section>
    <div id="draw-pile" aria-label="Draw pile">DRAW</div>
    <div id="call-banner" role="status"></div>
    <div id="animation-layer"></div>
  </main>
  <script src="script.js"></script>
</body>
</html>
